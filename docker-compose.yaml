# ============================================================
# ARIA — Production compose (Dokploy + Traefik + Let's Encrypt)
# ============================================================
# Services : timescaledb · migrate · 4 simulators · backend · frontend
# Routing  : Traefik (external dokploy-network) — no host ports.
# Required env vars : see .env.example
# ============================================================

services:
  timescaledb:
    image: timescale/timescaledb:2.21.0-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - aria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [aria]

  migrate:
    image: postgres:16-alpine
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./backend/infrastructure/database/migrations:/migrations:ro
      - ./backend/infrastructure/database/seeds:/seeds:ro
    entrypoint: ["/bin/sh", "/migrations/apply.sh"]
    restart: "no"
    networks: [aria]

  # ── Simulators (one per monitored cell) ──────────────────────
  simulator-filler:
    build:
      context: ./simulator
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SIMULATOR_MODE: ${SIMULATOR_MODE:-realtime}
      SIMULATOR_SCENARIO: bottle_filler
      SIMULATOR_TICK_INTERVAL_S: ${SIMULATOR_TICK_INTERVAL_S:-1.0}
      CELL_NAME: Bottle Filler
    restart: unless-stopped
    networks: [aria]

  simulator-source-pump:
    build:
      context: ./simulator
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SIMULATOR_MODE: ${SIMULATOR_MODE:-realtime}
      SIMULATOR_SCENARIO: source_pump
      SIMULATOR_TICK_INTERVAL_S: ${SIMULATOR_TICK_INTERVAL_S:-1.0}
      CELL_NAME: Source Pump
    restart: unless-stopped
    networks: [aria]

  simulator-uv:
    build:
      context: ./simulator
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SIMULATOR_MODE: ${SIMULATOR_MODE:-realtime}
      SIMULATOR_SCENARIO: uv_sterilizer
      SIMULATOR_TICK_INTERVAL_S: ${SIMULATOR_TICK_INTERVAL_S:-1.0}
      CELL_NAME: UV Sterilizer
    restart: unless-stopped
    networks: [aria]

  simulator-capper:
    build:
      context: ./simulator
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SIMULATOR_MODE: ${SIMULATOR_MODE:-realtime}
      SIMULATOR_SCENARIO: bottle_capper
      SIMULATOR_TICK_INTERVAL_S: ${SIMULATOR_TICK_INTERVAL_S:-1.0}
      CELL_NAME: Bottle Capper
    restart: unless-stopped
    networks: [aria]

  # ── Backend (FastAPI + 5 agents + MCP) ───────────────────────
  backend:
    build:
      context: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      MCP_API_KEY: ${MCP_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ARIA_MODEL: ${ARIA_MODEL:-sonnet}
      INVESTIGATOR_USE_MANAGED: ${INVESTIGATOR_USE_MANAGED:-false}
      ARIA_DEMO_ENABLED: ${ARIA_DEMO_ENABLED:-false}
      ARIA_MCP_PATH_SECRET: ${ARIA_MCP_PATH_SECRET}
      ARIA_MCP_PUBLIC_URL: https://${BACKEND_HOST}/mcp/${ARIA_MCP_PATH_SECRET}/
      CORS_ORIGINS: '["https://${FRONTEND_HOST}"]'
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*"]
    restart: unless-stopped
    networks: [aria, dokploy-network]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.aria-backend.rule=Host(`${BACKEND_HOST}`)"
      - "traefik.http.routers.aria-backend.entrypoints=websecure"
      - "traefik.http.routers.aria-backend.tls=true"
      - "traefik.http.routers.aria-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.aria-backend.loadbalancer.server.port=8000"

  # ── Frontend (Vite, dev server in container) ─────────────────
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: https://${BACKEND_HOST}
      VITE_API_URL: https://${BACKEND_HOST}
    restart: unless-stopped
    networks: [aria, dokploy-network]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.aria-front.rule=Host(`${FRONTEND_HOST}`)"
      - "traefik.http.routers.aria-front.entrypoints=websecure"
      - "traefik.http.routers.aria-front.tls=true"
      - "traefik.http.routers.aria-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.aria-front.loadbalancer.server.port=5173"

volumes:
  aria_pgdata:

networks:
  aria:
    driver: bridge
  dokploy-network:
    external: true
