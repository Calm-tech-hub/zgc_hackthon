# ============================================
# ARIA — Production override for Dokploy / Traefik
# ============================================
# Domains:
#   - Frontend : https://aria.vgtray.fr
#   - Backend  : https://aria-backend.vgtray.fr
#
# Usage:
#   - Place at repo root next to docker-compose.yaml
#   - Dokploy auto-merges *.override.yaml
#   - Verify your Traefik network name (commonly `dokploy-network`):
#       docker network ls | grep -iE 'traefik|dokploy'
# ============================================

services:
  timescaledb:
    ports: !reset []        # internal aria network only — never expose DB on host

  backend:
    ports: !reset []        # Traefik handles ingress
    environment:
      CORS_ORIGINS: '["https://aria.vgtray.fr"]'
      ARIA_MCP_PUBLIC_URL: https://aria-backend.vgtray.fr/mcp/${ARIA_MCP_PATH_SECRET}/
    networks:
      - aria
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.aria-backend.rule=Host(`aria-backend.vgtray.fr`)"
      - "traefik.http.routers.aria-backend.entrypoints=websecure"
      - "traefik.http.routers.aria-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.aria-backend.loadbalancer.server.port=8000"

  frontend:
    ports: !reset []
    environment:
      VITE_API_URL: https://aria-backend.vgtray.fr
    networks:
      - aria
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.aria-front.rule=Host(`aria.vgtray.fr`)"
      - "traefik.http.routers.aria-front.entrypoints=websecure"
      - "traefik.http.routers.aria-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.aria-front.loadbalancer.server.port=5173"

networks:
  dokploy-network:
    external: true
